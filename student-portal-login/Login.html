<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal Login</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Verdana, Arial, sans-serif;
        background-color: #1a3fa0;
        background-image: linear-gradient(#1a3fa0, #3f6fd6);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login-card {
        background-color: #ffffff;
        width: 350px;
        padding: 25px;
        border: 3px solid #1a3fa0;
        border-radius: 10px;
    }

    h1 {
        text-align: center;
        color: #1a3fa0;
        font-size: 24px;
    }

    h2 {
        text-align: center;
        color: #1a3fa0;
        font-size: 16px;
        margin-top: 5px;
        margin-bottom: 15px;
    }

    h2 span {
        border-bottom: 3px solid #1a3fa0;
        box-shadow: 0px 3px 3px rgba(26, 63, 160, 0.5);
        padding-bottom: 4px;
    }

    p {
        text-align: center;
        color: #555555;
        font-size: 13px;
        margin-bottom: 20px;
    }

    label {
        display: block;
        color: #1a3fa0;
        font-weight: bold;
        margin-top: 12px;
        margin-bottom: 5px;
        font-size: 14px;
    }

    input {
        width: 100%;
        padding: 8px;
        border: 2px solid #99a9d6;
        border-radius: 4px;
        font-size: 14px;
    }

    input:focus {
        outline: none;
        border: 2px solid #1a3fa0;
        background-color: #eef1fb;
    }

    button {
        width: 100%;
        padding: 10px;
        margin-top: 18px;
        background-color: #1a3fa0;
        color: white;
        font-size: 15px;
        font-weight: bold;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        box-shadow: 0px 3px 4px rgba(0, 0, 0, 0.3);
        
    }

    button:hover {
        background-color: #12296e;
    }

    a {
        display: block;
        text-align: center;
        margin-top: 15px;
        color: #1a3fa0;
        font-size: 13px;
        text-decoration: none;
    }

    a:hover {
        text-decoration: underline;
        color: #12296e;
    }
</style>
</head>
<body>

    <div class="login-card">

        <h1>Maduka University</h1>
        <h2><span>Student Portal</span></h2>

        <p>Enter your login</p>

        <form>
            <label for="matric">Matric Number</label>
            <input type="text" id="matric" name="matric" placeholder="Enter your matric number" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>

            <button type="submit">Login</button>
        </form>

        <a href="#">Forgot Password?</a>

    </div>

</body>
</html>
